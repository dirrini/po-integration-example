name: Deploy to Azure VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_VM_HOST: ${{ vars.AZURE_VM_HOST }}
  AZURE_VM_USER: ${{ secrets.AZURE_VM_USER }}
  DEPLOY_PATH: /home/${{ secrets.AZURE_VM_USER }}/dotnet-angular-app

jobs:
  deploy:
    name: Build and run on Azure VM
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          test -n "$AZURE_VM_HOST" || (echo "Missing production environment variable: AZURE_VM_HOST" && exit 1)
          test -n "$AZURE_VM_USER" || (echo "Missing production environment secret: AZURE_VM_USER" && exit 1)
          test -n "${{ secrets.AZURE_VM_SSH_KEY }}" || (echo "Missing production environment secret: AZURE_VM_SSH_KEY" && exit 1)
          test -n "${{ vars.APP_DOMAIN }}" || (echo "Missing production environment variable: APP_DOMAIN" && exit 1)
          test -n "${{ secrets.RABBITMQ_DEFAULT_USER }}" || (echo "Missing production environment secret: RABBITMQ_DEFAULT_USER" && exit 1)
          test -n "${{ secrets.RABBITMQ_DEFAULT_PASS }}" || (echo "Missing production environment secret: RABBITMQ_DEFAULT_PASS" && exit 1)
          test -n "${{ secrets.EXTERNAL_PRODUCTS_GRAPHQL_URL }}" || (echo "Missing production environment secret: EXTERNAL_PRODUCTS_GRAPHQL_URL" && exit 1)
          test -n "${{ secrets.EXTERNAL_PRODUCTS_API_KEY }}" || (echo "Missing production environment secret: EXTERNAL_PRODUCTS_API_KEY" && exit 1)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          tags: dotnet-angular-app-backend:latest
          load: true
          cache-from: type=gha,scope=dotnet-angular-app-backend
          cache-to: type=gha,mode=max,scope=dotnet-angular-app-backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          tags: dotnet-angular-app-frontend:latest
          load: true
          cache-from: type=gha,scope=dotnet-angular-app-frontend
          cache-to: type=gha,mode=max,scope=dotnet-angular-app-frontend

      - name: Package Docker images
        run: |
          docker save dotnet-angular-app-backend:latest dotnet-angular-app-frontend:latest | gzip > /tmp/dotnet-angular-app-images.tar.gz

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/azure_vm_key
          chmod 600 ~/.ssh/azure_vm_key
          ssh-keyscan -H "$AZURE_VM_HOST" >> ~/.ssh/known_hosts

      - name: Package application
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='backend/**/bin' \
            --exclude='backend/**/obj' \
            -czf /tmp/dotnet-angular-app.tar.gz .

      - name: Upload application to VM
        run: |
          ssh -i ~/.ssh/azure_vm_key "$AZURE_VM_USER@$AZURE_VM_HOST" "mkdir -p '$DEPLOY_PATH'"
          scp -i ~/.ssh/azure_vm_key /tmp/dotnet-angular-app.tar.gz "$AZURE_VM_USER@$AZURE_VM_HOST:/tmp/dotnet-angular-app.tar.gz"
          scp -i ~/.ssh/azure_vm_key /tmp/dotnet-angular-app-images.tar.gz "$AZURE_VM_USER@$AZURE_VM_HOST:/tmp/dotnet-angular-app-images.tar.gz"

      - name: Deploy with Docker Compose
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          HTTP_PORT: ${{ vars.HTTP_PORT || '80' }}
          HTTPS_PORT: ${{ vars.HTTPS_PORT || '443' }}
          RABBITMQ_DEFAULT_USER: ${{ secrets.RABBITMQ_DEFAULT_USER }}
          RABBITMQ_DEFAULT_PASS: ${{ secrets.RABBITMQ_DEFAULT_PASS }}
          EXTERNAL_PRODUCTS_GRAPHQL_URL: ${{ secrets.EXTERNAL_PRODUCTS_GRAPHQL_URL }}
          EXTERNAL_PRODUCTS_API_KEY: ${{ secrets.EXTERNAL_PRODUCTS_API_KEY }}
        run: |
          cat > /tmp/production.env <<EOF
          APP_DOMAIN=$APP_DOMAIN
          HTTP_PORT=$HTTP_PORT
          HTTPS_PORT=$HTTPS_PORT
          ASPNETCORE_ENVIRONMENT=Production
          ASPNETCORE_URLS=http://+:5000
          RABBITMQ_DEFAULT_USER=$RABBITMQ_DEFAULT_USER
          RABBITMQ_DEFAULT_PASS=$RABBITMQ_DEFAULT_PASS
          RabbitMq__HostName=rabbitmq
          RabbitMq__UserName=$RABBITMQ_DEFAULT_USER
          RabbitMq__Password=$RABBITMQ_DEFAULT_PASS
          EXTERNAL_PRODUCTS_GRAPHQL_URL=$EXTERNAL_PRODUCTS_GRAPHQL_URL
          EXTERNAL_PRODUCTS_API_KEY=$EXTERNAL_PRODUCTS_API_KEY
          ExternalProducts__GraphqlUrl=$EXTERNAL_PRODUCTS_GRAPHQL_URL
          ExternalProducts__ApiKey=$EXTERNAL_PRODUCTS_API_KEY
          EOF

          scp -i ~/.ssh/azure_vm_key /tmp/production.env "$AZURE_VM_USER@$AZURE_VM_HOST:/tmp/dotnet-angular-app.env"

          ssh -i ~/.ssh/azure_vm_key "$AZURE_VM_USER@$AZURE_VM_HOST" <<EOF
          set -euo pipefail
          tar -xzf /tmp/dotnet-angular-app.tar.gz -C "$DEPLOY_PATH"
          gunzip -c /tmp/dotnet-angular-app-images.tar.gz | docker load
          mv /tmp/dotnet-angular-app.env "$DEPLOY_PATH/.env"
          cd "$DEPLOY_PATH"
          docker compose -f docker-compose.prod.yml --env-file .env up -d --no-build
          docker image prune -f
          EOF
