services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: dotnet-angular-app-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    expose:
      - "5000"

  frontend:
    image: dotnet-angular-app-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        FRONTEND_DIRECT_ORDERS_URL: ${FRONTEND_DIRECT_ORDERS_URL}
        FRONTEND_AWS_API_GATEWAY_ORDERS_URL: ${FRONTEND_AWS_API_GATEWAY_ORDERS_URL}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend

volumes:
  rabbitmq_prod_data:
  caddy_data:
  caddy_config:
